<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Del Coding - Gestion des tâches</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#2563eb',
              600: '#1d4ed8'
            }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div class="mx-auto w-full max-w-5xl p-4 sm:p-6 lg:p-8">
    <header class="rounded-2xl bg-white p-4 shadow-md ring-1 ring-slate-200 sm:p-5">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-600 text-white font-semibold">✓</div>
          <div>
            <p class="text-lg font-bold text-slate-900">Del Coding</p>
          </div>
        </div>
        <nav class="hidden gap-5 text-sm font-medium text-slate-600 md:flex">
          <a href="#" class="hover:text-slate-900">Tâches</a>
          <a href="#" class="hover:text-slate-900">Communales</a>
          <a href="#" class="hover:text-slate-900">Support</a>
        </nav>
        <div class="flex items-center gap-3 text-slate-500">
          <button aria-label="Notifications" class="rounded-full p-2 hover:bg-slate-100">🔔</button>
          <div class="h-9 w-9 rounded-full bg-gradient-to-br from-sky-500 to-indigo-600 text-white flex items-center justify-center text-sm font-semibold">JU</div>
        </div>
      </div>
    </header>

    <main class="mt-6 space-y-5">
      <section class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
        <div class="mb-4">
          <p class="text-3xl font-bold text-slate-900">Gestion des tâches</p>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-xl font-semibold text-slate-800">Ajouter une tâche</h2>
          </div>
          <form id="taskForm" class="space-y-3">
            <div>
              <label for="title" class="mb-1 block text-sm font-medium text-slate-700">Titre</label>
              <input id="title" name="title" type="text" required placeholder="Saisir le titre de la tâche" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 outline-none ring-2 ring-transparent transition focus:border-blue-500 focus:ring-blue-200" />
            </div>
            <div>
              <label for="description" class="mb-1 block text-sm font-medium text-slate-700">Description</label>
              <textarea id="description" name="description" rows="2" required placeholder="Ajouter une description" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 outline-none ring-2 ring-transparent transition focus:border-blue-500 focus:ring-blue-200"></textarea>
            </div>
            <div class="flex justify-end">
              <button type="submit" class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-blue-700">Ajouter</button>
            </div>
          </form>
        </div>
      </section>

      <section class="rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200 sm:p-6">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-xl font-semibold text-slate-800">Liste des tâches</h2>
          <span id="taskCount" class="text-sm text-slate-500">2 tâches</span>
        </div>
        <div id="taskList" class="grid gap-3 md:grid-cols-2">
          <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="mb-3 flex items-start justify-between gap-2">
              <div>
                <h3 class="text-xl font-bold text-slate-900">🪄 Faire devoir</h3>
                <p class="text-slate-600">Math exercice</p>
                <p class="mt-2 flex items-center gap-1 text-sm font-medium text-slate-500"><span>📅</span> 17 Mars 2026</p>
              </div>
              <button class="rounded-xl text-slate-400 hover:bg-slate-100 hover:text-slate-700 px-2 py-1">⋯</button>
            </div>
            <div class="flex flex-wrap gap-2">
              <span class="rounded-md bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700">Non terminé</span>
              <button class="rounded-md bg-blue-600 px-3 py-1 text-xs font-semibold text-white hover:bg-blue-700">Terminer</button>
            </div>
          </article>

          <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="mb-3 flex items-start justify-between gap-2">
              <div>
                <h3 class="text-xl font-bold text-slate-900">🧩 Projet web</h3>
                <p class="text-slate-600">Interface Figma</p>
                <p class="mt-2 flex items-center gap-1 text-sm font-medium text-slate-500"><span>📅</span> 17 Mars 2026</p>
              </div>
              <button class="rounded-xl text-slate-400 hover:bg-slate-100 hover:text-slate-700 px-2 py-1">⋯</button>
            </div>
            <div class="flex flex-wrap gap-2">
              <span class="rounded-md bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Terminé</span>
              <button class="rounded-md bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700 hover:bg-rose-200">Supprimer</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/index.js"></script>
</body>
</html>
